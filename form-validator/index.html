<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <main class="app">
    <section class="form-card">
      <p class="eyebrow">Projekt JavaScript</p>

      <h1>Utwórz konto</h1>

      <p class="description">
        Zweryfikuj dane formularza po stronie klienta za pomocą vanilla JS.
      </p>

      <form class="signup-form" id="signup-form" novalidate>
        <div class="field" data-field="username">
          <label for="username">Nazwa użytkownika</label>

          <input id="username" name="username" type="text" placeholder="Np. maciek_dev" autocomplete="username" />

          <p class="field-error" id="username-error"></p>
        </div>

        <div class="field" data-field="email">
          <label for="email">Email</label>

          <input id="email" name="email" type="email" placeholder="Np. maciek@example.com" autocomplete="email" />

          <p class="field-error" id="email-error"></p>
        </div>

        <div class="field" data-field="password">
          <label for="password">Hasło</label>

          <input id="password" name="password" type="password" placeholder="Minimum 8 znaków"
            autocomplete="new-password" />

          <p class="field-error" id="password-error"></p>
        </div>

        <div class="field" data-field="confirm-password">
          <label for="confirm-password">Powtórz hasło</label>

          <input id="confirm-password" name="confirmPassword" type="password" placeholder="Wpisz hasło ponownie"
            autocomplete="new-password" />

          <p class="field-error" id="confirm-password-error"></p>
        </div>

        <div class="terms-field">
          <label class="checkbox-label">
            <input id="terms" name="terms" type="checkbox" />
            <span>Akceptuję regulamin i politykę prywatności.</span>
          </label>

          <p class="field-error" id="terms-error"></p>
        </div>

        <button class="submit-btn" type="submit">
          Utwórz konto
        </button>

        <p class="success-message" id="success-message"></p>
      </form>
    </section>
  </main>
</body>

</html>
