<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabs Dynamic Content</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <main class="app">
    <section class="tabs-card">
      <p class="eyebrow">Projekt JavaScript</p>
      <h1>Course Dashboard</h1>
      <p class="description">
        Kliknij zakładkę, aby zobaczyć dynamicznie renderowaną treść.
      </p>

      <div class="tabs" id="tabs">
        <button class="tab-btn active" type="button" data-tab="overview">
          Overview
        </button>

        <button class="tab-btn" type="button" data-tab="lessons">
          Lessons
        </button>

        <button class="tab-btn" type="button" data-tab="practice">
          Practice
        </button>

        <button class="tab-btn" type="button" data-tab="resources">
          Resources
        </button>
      </div>

      <section class="tab-panel" id="tab-panel"></section>
    </section>
  </main>
</body>

</html>
